services:
  mkvforge:
    image: ghcr.io/hawaiizfynest/mkvforge:latest
    container_name: mkvforge
    restart: unless-stopped
    ports:
      - "8089:8080"
    environment:
      - MEDIA_ROOT=/media
      - OUTPUT_DIR=/media/converted
      - DATA_DIR=/data
      - MAX_CONCURRENT=1
      - PUID=1000
      - PGID=0
      - RUN_AS_ROOT=1
      - TZ=America/Denver
    volumes:
      # Source media
      - /share/Multimedia:/media
      # Persistent log database + segment scratch (survives container restarts)
      - mkvforge_data:/data

volumes:
  mkvforge_data:
